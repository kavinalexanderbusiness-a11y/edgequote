<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EdgeQuote — Offline</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      background: #0b1120; color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    }
    .icon { width: 72px; height: 72px; }
    h1 { font-size: 18px; font-weight: 700; margin: 4px 0 0; }
    p { font-size: 13px; color: #9ca3af; margin: 0; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px; padding: 10px 18px; border-radius: 12px; border: 0;
      background: #10B981; color: #04221a; font-weight: 600; font-size: 14px;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="112" fill="#0e1729"/>
    <path d="M256 408 C 256 312 232 224 300 140 C 332 214 322 332 256 408 Z" fill="#10B981"/>
    <path d="M256 408 C 256 312 280 224 212 140 C 180 214 190 332 256 408 Z" fill="#10B981" opacity="0.85"/>
  </svg>
  <h1>You're offline</h1>
  <p>EdgeQuote needs a connection for this. Your cached pages still work — reconnect to sync.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
